<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPP CSV Adapter</title>
    <link rel="stylesheet" href="../branding/css/keystone-style.css">
    <link rel="stylesheet" href="csv-dpp-adapter.css">
</head>
<body>
    <div class="container">
        <div id="dpp-header-container"></div>

        <div class="card">
            <h1 data-i18n-key="dpp-csv-adapter"></h1>
            <nav style="margin-bottom: 20px;">
                <a href="../../index.html" data-i18n-key="back-to-home"></a>
            </nav>

            <section id="source-section">
                <h2 data-i18n-key="1-load-data"></h2>
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; margin-bottom: 0.5rem;"><strong data-i18n-key="target-sector-s"></strong></label>
                    <div id="sector-select" class="checkbox-group">
                        <label><input type="checkbox" name="sector" value="battery"> <span data-i18n-key="battery"></span></label>
                        <label><input type="checkbox" name="sector" value="construction"> <span data-i18n-key="construction"></span></label>
                        <label><input type="checkbox" name="sector" value="electronics"> <span data-i18n-key="electronics"></span></label>
                        <label><input type="checkbox" name="sector" value="iron-steel"> <span data-i18n-key="iron-amp-steel"></span></label>
                        <label><input type="checkbox" name="sector" value="textile"> <span data-i18n-key="textile"></span></label>
                        <label><input type="checkbox" name="sector" value="cement"> <span data-i18n-key="cement"></span></label>
                        <label><input type="checkbox" name="sector" value="packaging"> <span data-i18n-key="packaging-add-on"></span></label>
                    </div>
                </div>
                <p data-i18n-key="select-a-csv-file-containing"></p>
                <div class="file-drop-area" id="drop-area">
                    <p data-i18n-key="drag-amp-drop-csv-here"></p>
                    <input type="file" id="csv-file-input" accept=".csv">
                </div>
                <div id="file-info" class="hidden">
                    <p>Loaded: <strong id="file-name"></strong> (<span id="row-count"></span> rows)</p>
                </div>
            </section>

            <section id="mapping-section" class="hidden" style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
                <h2 data-i18n-key="2-map-fields"></h2>
                <p data-i18n-key="map-your-csv-columns-to"></p>
                
                <div class="toolbar" style="margin-bottom: 1rem; display: flex; gap: 1rem; align-items: center;">
                    <button id="load-config-btn" data-i18n-key="load-mapping-config"></button>
                    <button id="save-config-btn" data-i18n-key="save-mapping-config"></button>
                    <input type="file" id="config-file-input" accept=".json" style="display: none;">
                    
                    <div style="margin-left: auto;">
                        <label style="cursor: pointer; user-select: none;">
                            <input type="checkbox" id="show-incompatible-toggle"> <span data-i18n-key="show-incompatible-fields"></span>
                        </label>
                    </div>
                </div>

                <div style="overflow-x: auto;">
                    <table id="mapping-table" style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="background: #f5f5f5; text-align: left;">
                                <th style="padding: 10px;" data-i18n-key="csv-header"></th>
                                <th style="padding: 10px;" data-i18n-key="sample-value"></th>
                                <th style="padding: 10px;" data-i18n-key="target-dpp-field"></th>
                                <th style="padding: 10px; width: 60px; text-align: center;" data-i18n-key="review"></th>
                            </tr>
                        </thead>
                        <tbody id="mapping-tbody">
                            <!-- Rows generated dynamically -->
                        </tbody>
                    </table>
                </div>
            </section>

            <section id="action-section" class="hidden" style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
                <h2 data-i18n-key="3-generate"></h2>
                <p data-i18n-key="generate-a-single-json-file"></p>
                <div class="actions">
                    <button id="generate-btn" class="primary-btn" data-i18n-key="generate-dpps"></button>
                </div>
                <div id="output-area" style="margin-top: 15px;"></div>
            </section>
        </div>

        <footer>
            <p><small data-i18n-key="part-of-the-dpp-keystone"></small></p>
        </footer>
    </div>

    <!-- Vendor Libraries -->
    <!-- Removed manual script tag for papaparse, will import in module -->
    
    <!-- Application Logic -->
    <script type="module" src="csv-dpp-adapter.js"></script>
    <script type="module">
        import { LanguageManager } from '../lib/language-manager.js';
        LanguageManager.init('./index.i18n.json');
    </script>


</body></html>
