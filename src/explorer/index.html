<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPP Ontology Explorer</title>
    <link rel="stylesheet" href="../branding/css/keystone-style.css">
    <link rel="stylesheet" href="explorer.css">
</head>
<body>
    <div class="container">
        <header>
            <img src="../branding/images/keystone_logo.png" alt="DPP Keystone Logo" style="height: 80px;">
            <div>
                <h1 style="margin-bottom: 0; font-size: 2.2em;" data-i18n-key="dpp-ontology-explorer"></h1>
                <p style="margin-top: 0.5em; font-size: 1.1em; color: var(--text-light);" data-i18n-key="search-and-browse-definitions-across"></p>
            </div>
            <div id="language-widget-wrapper" style="margin-left: auto;"></div>
        </header>

        <nav style="margin-bottom: 20px;" data-i18n-key="home-wizard-validator"></nav>

        <div id="explorer-container">
            <section class="card">
                <input type="text" id="search-box" placeholder="" autofocus="" data-i18n-key="search-for-terms-e-g">
                <div id="results-area">
                    <p id="results-count"></p>
                    <div id="results-grid" class="results-grid"></div>
                </div>
            </section>
        </div>

        <footer>
            <p><small data-i18n-key="part-of-the-dpp-keystone"></small></p>
        </footer>
    </div>
    <script type="module" src="explorer.js"></script>
    <script type="module">
        import { LanguageManager } from '../lib/language-manager.js';
        LanguageManager.init('./index.i18n.json');
    </script>


</body></html>
